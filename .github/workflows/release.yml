name: Release TaskLite

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.15"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build plugin
        run: bun run build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            manifest.json
            main.js
            styles.css

      - name: Clean up pre-releases
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching releases..."
          gh release list --limit 200 | while read -r line; do
            tag=$(echo "$line" | cut -f3)
            type=$(echo "$line" | cut -f2)
            if [ "$type" = "Pre-release" ]; then
              echo "Deleting pre-release: $tag"
              gh release delete "$tag" -y --cleanup-tag
            fi
          done
