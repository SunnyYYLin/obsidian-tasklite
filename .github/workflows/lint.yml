name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                bun-version: "1.2.15"
            - run: npm install --legacy-peer-deps
            - run: bun test
            - run: bun run build
            - run: bun run lint

